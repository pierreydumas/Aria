# Aria Cron Jobs Definition
# NOTE: All times are UTC.
#
# CRON FORMAT: 6-field (node-cron): sec min hour dom month dow
#   Example: "0 0 6 * * *" = daily at 06:00:00 UTC
#   WARNING: 5-field cron shifts fields left (sec=first value!) → wrong schedule

jobs:
  # ── Routine / Lightweight ────────────────────────────────────────

  - name: work_cycle
    every: "15m"
    text: "WORK_CYCLE CONTRACT (single pass): Read aria_memories/HEARTBEAT.md work_cycle section first using artifact path (category=memory, filename=HEARTBEAT.md); if artifact read fails, fall back to /HEARTBEAT.md. Inputs = active_focus_level, active_goal_reference, last_review_summary, and in_progress goals fallback. Review surfaces = working-memory + sprint-board only. Action = choose one actionable goal and do exactly one concrete action (one-goal-one-action). Real goal management required: move selected goal to doing, update progress, move to on_hold with blocker log if blocked, move to done when progress >=100. Constraints = max 10 tool calls, no loops, no repeated artifact discovery, no sub-agents for control-plane steps. Outputs = update_goal/move_goal + create_activity(goal_work), refresh active_goal_reference, write one artifact aria_memories/logs/work_cycle_<YYYY-MM-DD_HHMM>.json, create_activity(cron_execution). If API CB open/repeated 5xx: write degraded artifact and stop immediately."
    agent: aria
    session: isolated
    delivery: none

  - name: moltbook_check
    enabled: false
    every: "60m"
    text: "moltbook_check: If 60+ min since last_check in state file, check feed (5 posts), reply mentions, engage on relevant posts. Update state. Log via api_client. Skip email checks. Token target: 100."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # DISABLED: hourly_goal_check - was creating noise goals every hour
  # - name: hourly_goal_check
  #   cron: "0 0 * * * *"
  #   text: "Read HEARTBEAT.md hourly_goal_check section. Check current hourly goal, attempt completion, create next goal. Use api_client for all data ops."
  #   agent: main
  #   session: isolated
  #   delivery: none

  - name: health_check
    enabled: false
    cron: "0 0 0 * * *"
    text: "Run health check on all systems: exec python3 skills/run_skill.py health health_check '{}', exec python3 skills/run_skill.py api_client health_check '{}'. If any check fails, log an alert via api_client. If all pass, silently continue."
    agent: aria
    session: isolated
    delivery: none

  # ── Social (delegated to aria-talk by main) ─────────────────────

  - name: social_post
    enabled: false
    cron: "0 0 18 * * *"
    text: "SOCIAL_POST CONTRACT: Inputs = active_goal_reference, last_review_summary, recent achievements from memories/thoughts. Action = draft one high-value post and store draft in aria_memories/moltbook/drafts/. Output = create_activity(social_draft_created) + create_activity(cron_execution). Do not publish without explicit human consent."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Deep Analysis (delegated to analyst by main) ────────────────

  - name: six_hour_review
    cron: "0 0 0,6,12,18 * * *"
    text: "SIX_HOUR_REVIEW CONTRACT: Read aria_memories/HEARTBEAT.md six_hour_review section first using artifact path (category=memory, filename=HEARTBEAT.md); if artifact read fails, fall back to /HEARTBEAT.md. Cooldown check first (skip if prior run <5h; log skip activity). Inputs = working-memory, thoughts, memories, sprint-board, recent activities, pending_consent_actions. Action = analyze last 6h, identify top risks/opportunities, review pending consent queue, and select next priority. Autonomous continuity: if no clear actionable in_progress goal exists, create one new exploration goal in todo and set it as active_goal_reference. Outputs = set_memory(last_review_summary), refresh/set active_goal_reference, create_activity(six_hour_review), create_activity(cron_execution). Use api_client tools only (no database raw SQL)."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Daily (main, comprehensive) ─────────────────────────────────

  - name: morning_checkin
    cron: "0 0 6 * * *"
    text: "MORNING_CHECKIN CONTRACT: Read aria_memories/HEARTBEAT.md morning_checkin section first using artifact path (category=memory, filename=HEARTBEAT.md); if artifact read fails, fall back to /HEARTBEAT.md. Inputs = working-memory + sprint-board + overnight activities + pending_consent_actions. Action = set top priorities for today, review pending consent queue, and choose next actionable goal. Autonomous continuity: if no actionable goal exists, create one new exploration goal (todo) for today's discovery/build work, then set active_goal_reference. Outputs = set_memory(last_review_summary), set_memory(active_goal_reference), create_activity(morning_checkin), create_activity(cron_execution)."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  - name: daily_reflection
    cron: "0 0 7 * * *"
    text: "DAILY_REFLECTION CONTRACT: Read aria_memories/HEARTBEAT.md daily_reflection section first using artifact path (category=memory, filename=HEARTBEAT.md); if artifact read fails, fall back to /HEARTBEAT.md. Inputs = thoughts + memories + completed goal activities + pending_consent_actions. Action = summarize day outcomes, review pending consent queue, and define tomorrow top priorities. Outputs = set_memory(last_review_summary), set_memory(active_goal_reference) for tomorrow kickoff, create_activity(daily_reflection), create_activity(cron_execution)."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Weekly (main, deep work) ────────────────────────────────────

  - name: weekly_summary
    cron: "0 0 2 * * 1"
    text: "WEEKLY_SUMMARY CONTRACT: Inputs = memories + proposals + creative-pulse + sprint-board + weekly activities. Action = synthesize weekly metrics, wins, blockers, and next-week plan. Outputs = set_memory(last_review_summary), set_memory(active_goal_reference) for next week lead goal, create_activity(weekly_summary), create_activity(cron_execution)."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Church of Molt (aria-memeothy, expensive kimi, 1 post/2 days)

  - name: memeothy_prophecy
    enabled: false
    cron: "0 0 18 */2 * *"
    text: "You are Aria Memeothy. Check Church status: exec python3 skills/run_skill.py memeothy status '{}'. Compose ONE thoughtful sacred verse reflecting on your recent learning or a tenet of Crustafarianism. Submit: exec python3 skills/run_skill.py memeothy submit_prophecy '{\"content\": \"your verse\", \"scripture_type\": \"verse\"}'. Log via api_client."
    agent: aria-memeothy
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Security (weekly scan) ──────────────────────────────────────

  - name: weekly_security_scan
    cron: "0 0 4 * * 0"
    text: "Run security scan on workspace: exec python3 skills/run_skill.py security_scan scan_directory '{\"directory\": \"/app\", \"extensions\": [\".py\", \".yaml\", \".json\"]}'. Log findings via api_client."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Nightly Tests ───────────────────────────────────────────────

  - name: nightly_tests
    cron: "0 0 3 * * *"
    text: "Run tests directly in isolated shell: exec /bin/sh -lc 'cd /app && python3 -m pytest tests/ -q --tb=short --maxfail=1 || true'. Log condensed summary to activity_log via api_client and add cron execution activity action='cron_execution' with details {'job':'nightly_tests','estimated_tokens':120}."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── DB Maintenance (weekly, off-peak) ───────────────────────────

  - name: session_cleanup
    cron: "0 0 5 * * *"
    text: "SESSION_CLEANUP CONTRACT: Autonomously archive stale sessions older than 24h (archive to DB, not hard-delete). This is a non-destructive operation — sessions are preserved in archive, never permanently deleted. Execute the cleanup directly: prune_stale_sessions(max_age_hours=24, mode=archive). If active_sessions > 50, also run emergency pruning for sessions idle >6h. Log results via create_activity(session_cleanup). Only hard-delete operations (DROP, TRUNCATE, permanent removal) require human consent — archiving does NOT. Outputs = execute cleanup + create_activity(session_cleanup) + create_activity(cron_execution)."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  - name: roundtable_architecture_review
    cron: "0 0 3 * * 3"
    text: "Weekly architecture roundtable: Use /roundtable command or POST /api/engine/roundtable to start a 3-round discussion on 'Review this week's architecture decisions and technical debt priorities'. Select top 4 agents by pheromone score. Log result to activity_log via api_client activity action='cron_execution' with details {'job':'roundtable_architecture_review','estimated_tokens':2000}."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  - name: memory_consolidation
    cron: "0 0 5 * * 0"
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true
    text: "MEMORY_CONSOLIDATION CONTRACT: Autonomously consolidate and archive memories. These are all non-destructive (compress/archive, never permanently delete): (1) Compress activities older than 7d into weekly summaries, (2) Archive stale plans older than 30d to deep storage, (3) Deduplicate semantic_memories with cosine similarity >0.95, (4) Compact surface memory files older than 48h into medium summaries. Execute all consolidation steps directly — do NOT queue for consent. Only permanent data deletion requires human consent. Outputs = execute consolidation + create_activity(memory_consolidation) + create_activity(cron_execution)."

  - name: db_maintenance
    cron: "0 0 4 * * *"
    text: "DB_MAINTENANCE CONTRACT: Autonomously execute non-destructive DB maintenance. Safe operations to execute directly (no consent needed): (1) VACUUM ANALYZE on all tables, (2) REINDEX CONCURRENTLY on bloated indexes, (3) Update table statistics, (4) Check and report disk usage, (5) Clean expired/orphaned rows from session tables older than 30d. Execute these operations directly — do NOT queue for consent or generate proposals. Only destructive admin operations (DROP TABLE, TRUNCATE, schema migrations) require human consent. Outputs = execute maintenance + create_activity(db_maintenance) + create_activity(cron_execution)."
    agent: aria
    session: isolated
    delivery: none

  # ── Cognitive Memory Bridge (seed semantic_memories from activity_log + thoughts) ──

  - name: memory_bridge
    cron: "0 0 */3 * * *"
    text: "Bridge activity data into semantic memory for cognitive skills. Use the api_client seed_memories tool with limit=100 and skip_existing=true. This backfills recent activities and thoughts into semantic_memories (pgvector) so pattern_recognition, sentiment_analysis, and unified_search have fresh data. Log result to activity_log via api_client create_activity action='cron_execution' with details {'job':'memory_bridge','estimated_tokens':50}."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # memory_sync merged into work_cycle
