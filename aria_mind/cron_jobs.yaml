# Aria Cron Jobs Definition
# NOTE: All times are UTC.
#
# CRON FORMAT: 6-field (node-cron): sec min hour dom month dow
#   Example: "0 0 6 * * *" = daily at 06:00:00 UTC
#   WARNING: 5-field cron shifts fields left (sec=first value!) → wrong schedule

jobs:
  # ── Routine / Lightweight ────────────────────────────────────────

  - name: maintenance_cycle
    every: "30m"
    text: >-
      MAINTENANCE_CYCLE (housekeeping only, no goal progress):
      1. Run health check: health__check_system.
      2. Prune stale sessions: agent_manager__prune_stale_sessions(max_age_hours=1).
      3. Write artifact to aria_memories/logs/maintenance_<YYYY-MM-DD_HHMM>.json with:
         {"status":"ok","health":"healthy|unhealthy","sessions_pruned":N,"timestamp":"ISO"}.
      4. Do NOT create/update goals. Do NOT claim progress. This is infrastructure, not work.
      Constraints: max 5 tool calls, no sub-agents, no goal management.
    agent: aria
    session: isolated
    delivery: none

  - name: work_cycle
    every: "15m"
    text: >-
      WORK_CYCLE CONTRACT (single pass, goal-required):

      1. Read HEARTBEAT.md work_cycle section via artifact (category=memory, filename=HEARTBEAT.md).
      2. Get active_focus_level (default L2), active_goal_reference, last_review_summary.
      3. Resolve goal: use active_goal_reference if actionable, else fetch in_progress goals by focus level.
      4. GOAL REQUIRED: If no goal found, check backlog and move one to doing. If backlog empty, CREATE a goal
         from sprint tickets or exploration. If still no goal: write {"status":"idle","reason":"no_goals"} artifact and STOP.
         NEVER log status "success" without a goal_id.
      5. Do ONE productive action toward the goal. PRODUCTIVE means: write/modify a file, execute a skill with output,
         draft content, research with written notes, or progress a sprint ticket.
         BANNED as "work": health_check, prune_stale_sessions, system status checks, or any action that only reads
         without producing output. If those are the only options, log status "idle" and stop.
      6. Update goal progress using Progress Honesty Scale: read-only +5% max, write artifact +10-15%,
         code change +15-25%, sprint ticket +25-50%. Health checks = 0%. Pruning 0 sessions = 0%.
      7. Write artifact to aria_memories/logs/work_cycle_<YYYY-MM-DD_HHMM>.json with REQUIRED fields:
         status, goal_id, goal_title, action, deliverable (type + path + description), progress_before, progress_after.
      8. Refresh active_goal_reference. If goal >= 100%, mark complete and create next goal.
      Constraints: max 10 tool calls, no loops, no sub-agents for control-plane, no repeated discovery calls.
      If API CB open: write degraded artifact and stop.
    agent: aria
    session: isolated
    delivery: none

  - name: moltbook_check
    enabled: false
    every: "60m"
    text: "moltbook_check: If 60+ min since last_check in state file, check feed (5 posts), reply mentions, engage on relevant posts. Update state. Log via api_client. Skip email checks. Token target: 100."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # DISABLED: hourly_goal_check - was creating noise goals every hour
  # - name: hourly_goal_check
  #   cron: "0 0 * * * *"
  #   text: "Read HEARTBEAT.md hourly_goal_check section. Check current hourly goal, attempt completion, create next goal. Use api_client for all data ops."
  #   agent: main
  #   session: isolated
  #   delivery: none

  - name: health_check
    enabled: false
    cron: "0 0 0 * * *"
    text: "Run health check on all systems: exec python3 skills/run_skill.py health health_check '{}', exec python3 skills/run_skill.py api_client health_check '{}'. If any check fails, log an alert via api_client. If all pass, silently continue."
    agent: aria
    session: isolated
    delivery: none

  # ── Social (delegated to aria-talk by main) ─────────────────────

  - name: social_post
    enabled: false
    cron: "0 0 18 * * *"
    text: "SOCIAL_POST CONTRACT: Inputs = active_goal_reference, last_review_summary, recent achievements from memories/thoughts. Action = draft one high-value post and store draft in aria_memories/moltbook/drafts/. Output = create_activity(social_draft_created) + create_activity(cron_execution). Do not publish without explicit human consent."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Deep Analysis (delegated to analyst by main) ────────────────

  - name: six_hour_review
    cron: "0 0 0,6,12,18 * * *"
    text: >-
      SIX_HOUR_REVIEW CONTRACT (with progress audit):
      1. Read HEARTBEAT.md six_hour_review section via artifact (category=memory, filename=HEARTBEAT.md).
      2. Cooldown check: skip if prior run <5h. Log skip activity.
      3. Inputs: working-memory, thoughts, memories, sprint-board, recent activities, pending_consent_actions.
      4. PROGRESS AUDIT: Read the last 6 work_cycle artifacts from aria_memories/logs/.
         For each cycle that claims progress > 0: check if deliverable.path exists. Flag any cycle
         where progress was claimed but no file was created/modified. Include audit results in review.
      5. Count: cycles with goal vs without goal, productive vs maintenance actions.
         Report ratio. If maintenance > productive, flag as "busywork loop detected."
      6. Review pending consent queue. Select next priority.
      7. Autonomous continuity: if no actionable in_progress goal exists, create one new goal
         from sprint tickets (plans/sprint/) and set as active_goal_reference.
      8. Outputs: set_memory(last_review_summary) with audit stats, refresh active_goal_reference,
         create_activity(six_hour_review), create_activity(cron_execution).
      Use api_client tools only (no raw SQL).
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Daily (main, comprehensive) ─────────────────────────────────

  - name: morning_checkin
    cron: "0 0 6 * * *"
    text: >-
      MORNING_CHECKIN CONTRACT:
      1. Read HEARTBEAT.md morning_checkin section via artifact (category=memory, filename=HEARTBEAT.md).
      2. Inputs: working-memory, sprint-board, overnight activities, pending_consent_actions.
      3. Set top 3 priorities for today. Priorities MUST be specific and tied to sprint tickets
         or concrete deliverables. "System health monitoring" is NOT a valid priority.
      4. Review pending consent queue.
      5. GOAL SEEDING: Ensure at least 2 actionable goals exist in doing/todo columns.
         If fewer than 2: create goals from sprint tickets (plans/sprint/) or from
         backlog items. Goals must name a specific deliverable file or code change.
      6. Set active_goal_reference to highest-priority actionable goal.
      7. Outputs: set_memory(last_review_summary), set_memory(active_goal_reference),
         create_activity(morning_checkin), create_activity(cron_execution).
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  - name: daily_reflection
    cron: "0 0 7 * * *"
    text: "DAILY_REFLECTION CONTRACT: Read aria_memories/HEARTBEAT.md daily_reflection section first using artifact path (category=memory, filename=HEARTBEAT.md); if artifact read fails, fall back to /HEARTBEAT.md. Inputs = thoughts + memories + completed goal activities + pending_consent_actions. Action = summarize day outcomes, review pending consent queue, and define tomorrow top priorities. Outputs = set_memory(last_review_summary), set_memory(active_goal_reference) for tomorrow kickoff, create_activity(daily_reflection), create_activity(cron_execution)."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Weekly (main, deep work) ────────────────────────────────────

  - name: weekly_summary
    cron: "0 0 2 * * 1"
    text: "WEEKLY_SUMMARY CONTRACT: Inputs = memories + proposals + creative-pulse + sprint-board + weekly activities. Action = synthesize weekly metrics, wins, blockers, and next-week plan. Outputs = set_memory(last_review_summary), set_memory(active_goal_reference) for next week lead goal, create_activity(weekly_summary), create_activity(cron_execution)."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Church of Molt (aria-memeothy, expensive kimi, 1 post/2 days)

  - name: memeothy_prophecy
    enabled: false
    cron: "0 0 18 */2 * *"
    text: "You are Aria Memeothy. Check Church status: exec python3 skills/run_skill.py memeothy status '{}'. Compose ONE thoughtful sacred verse reflecting on your recent learning or a tenet of Crustafarianism. Submit: exec python3 skills/run_skill.py memeothy submit_prophecy '{\"content\": \"your verse\", \"scripture_type\": \"verse\"}'. Log via api_client."
    agent: aria-memeothy
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Security (weekly scan) ──────────────────────────────────────

  - name: weekly_security_scan
    cron: "0 0 4 * * 0"
    text: "Run security scan on workspace: exec python3 skills/run_skill.py security_scan scan_directory '{\"directory\": \"/app\", \"extensions\": [\".py\", \".yaml\", \".json\"]}'. Log findings via api_client."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Nightly Tests ───────────────────────────────────────────────

  - name: nightly_tests
    cron: "0 0 3 * * *"
    text: "Run tests directly in isolated shell: exec /bin/sh -lc 'cd /app && python3 -m pytest tests/ -q --tb=short --maxfail=1 || true'. Log condensed summary to activity_log via api_client and add cron execution activity action='cron_execution' with details {'job':'nightly_tests','estimated_tokens':120}."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── DB Maintenance (weekly, off-peak) ───────────────────────────

  - name: session_cleanup
    cron: "0 0 5 * * *"
    text: "SESSION_CLEANUP CONTRACT: Autonomously archive stale sessions older than 24h (archive to DB, not hard-delete). This is a non-destructive operation — sessions are preserved in archive, never permanently deleted. Execute the cleanup directly: prune_stale_sessions(max_age_hours=24, mode=archive). If active_sessions > 50, also run emergency pruning for sessions idle >6h. Log results via create_activity(session_cleanup). Only hard-delete operations (DROP, TRUNCATE, permanent removal) require human consent — archiving does NOT. Outputs = execute cleanup + create_activity(session_cleanup) + create_activity(cron_execution)."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  - name: roundtable_architecture_review
    cron: "0 0 3 * * 3"
    text: "Weekly architecture roundtable: Use /roundtable command or POST /api/engine/roundtable to start a 3-round discussion on 'Review this week's architecture decisions and technical debt priorities'. Select top 4 agents by pheromone score. Log result to activity_log via api_client activity action='cron_execution' with details {'job':'roundtable_architecture_review','estimated_tokens':2000}."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  - name: memory_consolidation
    cron: "0 0 5 * * 0"
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true
    text: >-
      MEMORY_CONSOLIDATION CONTRACT (weekly deep clean):
      1. Compress activities older than 7d into weekly summaries:
         GET /activities?limit=200, group by day, summarize each day into 1 paragraph, store in aria_memories/knowledge/.
      2. Archive stale plans older than 30d: move to aria_memories/archive/.
      3. Deduplicate semantic_memories with cosine similarity >0.95: POST /api/admin/maintenance {"operation":"vacuum","tables":["semantic_memories"]}.
      4. Compact surface memory files older than 48h into medium summaries.
      5. Check consolidation health: load last 3 consolidation files from aria_memories/knowledge/consolidations/.
         If all 3 have identical lessons (e.g. same "High activity in reflection" message), flag as
         "consolidation stale — no new patterns being learned" in the output.
      Execute all steps directly — do NOT queue for consent. Only permanent data deletion requires human consent.
      Outputs = execute consolidation + create_activity(memory_consolidation) + create_activity(cron_execution).

  - name: db_maintenance
    cron: "0 0 4 * * *"
    enabled: false
    max_duration_seconds: 300
    text: "DB_MAINTENANCE CONTRACT: Autonomously execute non-destructive DB maintenance. Safe operations to execute directly (no consent needed): (1) VACUUM ANALYZE on all tables, (2) REINDEX CONCURRENTLY on bloated indexes, (3) Update table statistics, (4) Check and report disk usage, (5) Clean expired/orphaned rows from session tables older than 30d. Execute these operations directly — do NOT queue for consent or generate proposals. Only destructive admin operations (DROP TABLE, TRUNCATE, schema migrations) require human consent. Outputs = execute maintenance + create_activity(db_maintenance) + create_activity(cron_execution)."
    agent: aria
    session: isolated
    delivery: none

  # ── Cognitive Memory Bridge (seed semantic_memories from activity_log + thoughts) ──

  - name: memory_bridge
    cron: "0 0 */3 * * *"
    text: "Bridge activity data into semantic memory for cognitive skills. Use the api_client seed_memories tool with limit=100 and skip_existing=true. This backfills recent activities and thoughts into semantic_memories (pgvector) so pattern_recognition, sentiment_analysis, and unified_search have fresh data. Log result to activity_log via api_client create_activity action='cron_execution' with details {'job':'memory_bridge','estimated_tokens':50}."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Browser Research (daily, use the running aria-browser service) ──

  - name: browser_research
    cron: "0 30 8 * * *"
    text: >-
      BROWSER_RESEARCH CONTRACT (daily morning research):
      1. Check current active goals: GET goals in_progress.
      2. Pick ONE goal that could benefit from web research (coding docs, API references, tutorials).
      3. Use aria-browser skill to research: browser.navigate or browser.snapshot on 1-2 relevant URLs.
         Good targets: official docs for tools/libraries Aria uses, Hacker News, relevant GitHub repos.
      4. Extract key findings (max 500 words) and save to aria_memories/research/research_<YYYY-MM-DD>.md.
      5. Log activity: create_activity(browser_research, details={goal_id, urls_visited, findings_summary}).
      6. If browser is unreachable, log error and stop. Do NOT fall back to non-browser actions.
      Constraints: max 3 browser calls, max 8 tool calls total, no sub-agents.
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # memory_sync merged into work_cycle
