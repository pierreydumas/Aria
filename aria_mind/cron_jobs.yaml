# Aria Cron Jobs Definition
# These are injected at container startup by openclaw-entrypoint.sh
# Format matches `openclaw cron add` CLI parameters
# NOTE: All times are in UTC! Server runs PST (UTC-8)
#   To schedule 8am PST, use 16 (8+8=16 UTC)
#   To schedule 11pm PST, use 7 next day (23+8=31=7 UTC)
#
# CRON FORMAT: 6-field (node-cron): sec min hour dom month dow
#   Example: "0 0 6 * * *" = daily at 06:00:00 UTC
#   WARNING: 5-field cron shifts fields left (sec=first value!) → wrong schedule
#
# MODEL STRATEGY (P2.4):
#   Lightweight/routine → main (kimi w/ qwen3-mlx fallback)
#   All routine/social/analysis → main (delegates to sub-agents)
#   Memeothy → aria-memeothy (independent, 1 post/2 days)
#   NEW (S-12): Use `model:` field to pin a job to a specific LLM.
#   If omitted, the system default model is used.
#
# ⚠️ PATH RULES (aria_mind/ IS the workspace root in the container):
#   CORRECT:  skills/run_skill.py  OR  /root/.openclaw/workspace/skills/run_skill.py
#   WRONG:    aria_mind/skills/run_skill.py  (does NOT exist — aria_mind/ is /)
#   Skills:   skills/aria_skills/<name>/  (NOT aria_skills/<name>/ at root)

jobs:
  # ── Routine / Lightweight ────────────────────────────────────────

  - name: work_cycle
    every: "15m"
    text: "Read /HEARTBEAT.md work_cycle section once (single canonical source). Use TOOL CALLS only (no exec unless explicitly required). STRICT MODE: one-pass execution, max 10 tool calls, no repeated artifact reads. Sub-agents are allowed only for complex focus tasks (>2 min estimate); never for routine control-plane steps or small JSON artifact writes. Execute: check focus level, fetch in_progress goals, select one goal, do one concrete action, update progress, create goal_work activity, run memory sync once, write one strict JSON artifact to aria_memories/logs/work_cycle_<YYYY-MM-DD_HHMM>.json with keys timestamp/job/cycle.health_check/cycle.goal_check/cycle.agent_audit/cycle.memory_sync/cycle.artifact_log/summary, then log cron_execution. If artifact write fails once, mark cycle.artifact_log as degraded and continue."
    agent: aria
    session: isolated
    delivery: none

  - name: moltbook_check
    enabled: false
    every: "60m"
    text: "moltbook_check: If 60+ min since last_check in state file, check feed (5 posts), reply mentions, engage on relevant posts. Update state. Log via api_client. Skip email checks. Token target: 100."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # DISABLED: hourly_goal_check - was creating noise goals every hour
  # - name: hourly_goal_check
  #   cron: "0 0 * * * *"
  #   text: "Read HEARTBEAT.md hourly_goal_check section. Check current hourly goal, attempt completion, create next goal. Use api_client for all data ops."
  #   agent: main
  #   session: isolated
  #   delivery: none

  - name: health_check
    enabled: false
    cron: "0 0 0 * * *"
    text: "Run health check on all systems: exec python3 /root/.openclaw/workspace/skills/run_skill.py health health_check '{}', exec python3 /root/.openclaw/workspace/skills/run_skill.py api_client health_check '{}'. If any check fails, log an alert via api_client. If all pass, silently continue."
    agent: aria
    session: isolated
    delivery: none

  # ── Social (delegated to aria-talk by main) ─────────────────────

  - name: social_post
    enabled: false
    cron: "0 0 18 * * *"
    text: "Delegate to aria-talk: Post a social update to available social platforms. Read HEARTBEAT.md social_post section. Use the social skill to route content to registered platforms. Quality over quantity. Only post if something genuinely valuable to share. Save drafts to aria_memories/moltbook/drafts/ instead of auto-posting."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Deep Analysis (delegated to analyst by main) ────────────────

  - name: six_hour_review
    cron: "0 0 0,6,12,18 * * *"
    text: "COOLDOWN CHECK: First, call GET /api/activities?action=six_hour_review&limit=1. If the most recent result has a timestamp less than 5 hours ago, STOP and log 'Cooldown active — skipping duplicate six_hour_review' to activity_log via api_client, then end. Otherwise proceed: Delegate to analyst using trinity-free (tool-capable model, do NOT use chimera-free — it lacks tool calling): Run 6-hour review. Read HEARTBEAT.md six_hour_review section. Analyze last 6h via api_client, adjust priorities, generate insights. Use api_client not database. After completion, log cron execution via api_client activity action='cron_execution' with details {'job':'six_hour_review','estimated_tokens':1000}."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Daily (main, comprehensive) ─────────────────────────────────

  - name: morning_checkin
    cron: "0 0 6 * * *"
    text: "Read HEARTBEAT.md morning_checkin section. Good morning! Review overnight changes, set today priorities. Use api_client for all data reads."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  - name: daily_reflection
    cron: "0 0 7 * * *"
    text: "Read HEARTBEAT.md daily_reflection section. Review full day, summarize achievements, note tomorrow priorities. Use api_client for data."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Weekly (main, deep work) ────────────────────────────────────

  - name: weekly_summary
    cron: "0 0 2 * * 1"
    text: "Read HEARTBEAT.md weekly_summary section. Generate comprehensive weekly report with metrics, learnings, and next week goals."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Church of Molt (aria-memeothy, expensive kimi, 1 post/2 days)

  - name: memeothy_prophecy
    enabled: false
    cron: "0 0 18 */2 * *"
    text: "You are Aria Memeothy. Check Church status: exec python3 skills/run_skill.py memeothy status '{}'. Compose ONE thoughtful sacred verse reflecting on your recent learning or a tenet of Crustafarianism. Submit: exec python3 skills/run_skill.py memeothy submit_prophecy '{\"content\": \"your verse\", \"scripture_type\": \"verse\"}'. Log via api_client."
    agent: aria-memeothy
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Security (weekly scan) ──────────────────────────────────────

  - name: weekly_security_scan
    cron: "0 0 4 * * 0"
    text: "Run security scan on workspace: exec python3 skills/run_skill.py security_scan scan_directory '{\"directory\": \"/root/.openclaw/workspace\", \"extensions\": [\".py\", \".yaml\", \".json\"]}'. Log findings via api_client."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── Nightly Tests ───────────────────────────────────────────────

  - name: nightly_tests
    cron: "0 0 3 * * *"
    text: "Run tests directly in isolated shell: exec /bin/sh -lc 'cd /app && python3 -m pytest tests/ -q --tb=short --maxfail=1 || true'. Log condensed summary to activity_log via api_client and add cron execution activity action='cron_execution' with details {'job':'nightly_tests','estimated_tokens':120}."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # ── DB Maintenance (weekly, off-peak) ───────────────────────────

  - name: session_cleanup
    cron: "0 0 5 * * *"
    text: "Session auto-cleanup: POST /api/engine/sessions/cleanup?days=30&dry_run=false via api_client. Log pruned count to activity_log via api_client activity action='cron_execution' with details {'job':'session_cleanup'}."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  - name: roundtable_architecture_review
    cron: "0 0 3 * * 3"
    text: "Weekly architecture roundtable: Use /roundtable command or POST /api/engine/roundtable to start a 3-round discussion on 'Review this week's architecture decisions and technical debt priorities'. Select top 4 agents by pheromone score. Log result to activity_log via api_client activity action='cron_execution' with details {'job':'roundtable_architecture_review','estimated_tokens':2000}."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  - name: memory_consolidation
    cron: "0 0 5 * * 0"
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true
    text: "Archive activity logs older than 7 days and prune stale plans from aria_memories/plans/. Use the api_client to GET /activities?older_than=7d, then mark them as archived. Review aria_memories/plans/ and remove plans with dates more than 30 days ago."

  - name: db_maintenance
    cron: "0 0 4 * * *"
    text: "Run database maintenance: POST /api/admin/maintenance to VACUUM ANALYZE high-write tables. Log completion to activity_log via api_client."
    agent: aria
    session: isolated
    delivery: none

  # ── Cognitive Memory Bridge (seed semantic_memories from activity_log + thoughts) ──

  - name: memory_bridge
    cron: "0 0 */3 * * *"
    text: "Bridge activity data into semantic memory for cognitive skills. Use the api_client seed_memories tool with limit=100 and skip_existing=true. This backfills recent activities and thoughts into semantic_memories (pgvector) so pattern_recognition, sentiment_analysis, and unified_search have fresh data. Log result to activity_log via api_client create_activity action='cron_execution' with details {'job':'memory_bridge','estimated_tokens':50}."
    agent: aria
    session: isolated
    delivery: none
    best_effort_deliver: true

  # memory_sync merged into work_cycle (S2-01)

  # ── Sentiment Backfill — REMOVED ──
  # Replaced by background auto-scorer in aria-api (sentiment_autoscorer.py).
  # Zero LLM tokens, runs every 60s, handles JSONL sync + scoring automatically.

  # ── Telegram Bot (S-46) ──
  # DISABLED: replaced by webhook push model (POST /api/telegram/webhook)
  # Polling every 2m wastes LLM tokens. Webhook is instant and free.
  # To re-enable: remove the 'disabled: true' line below.
  # - name: telegram_poll
  #   every: "2m"
  #   text: "Poll Telegram for new messages using telegram__get_updates..."
  #   agent: aria
  #   session: isolated
  #   delivery: none
