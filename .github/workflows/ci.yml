name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check aria_skills/ aria_agents/ aria_models/ src/

      - name: Security scan
        run: bandit -r aria_skills/ aria_engine/ src/ -c pyproject.toml || true

      - name: Unit tests
        run: pytest tests/test_architecture.py tests/test_imports.py -v --tb=short
